<!doctype html>
<html lang="hu">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Identity Mock Tester</title><style>body{font-family:system-ui;background:#0b1020;color:#e8eefc;margin:0}header{padding:28px 32px;background:#111832}main{padding:20px;display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}section{border:1px solid #25304e;border-radius:16px;padding:18px;background:#111832}input,textarea{width:100%;box-sizing:border-box;padding:10px;border-radius:10px;background:#0b1020;color:white;border:1px solid #33405f}button{margin-top:12px;padding:10px 14px;border:0;border-radius:10px;background:#7c9cff;font-weight:700}pre{white-space:pre-wrap;background:#070b16;padding:12px;border-radius:12px}.wide{grid-column:1/-1}</style></head>
<body><header><h1>Auth0-style Identity Mock Tester</h1><p>Mock oldal az identity API kézi teszteléséhez.</p></header><main><section><h2>Status</h2><button onclick="health()">GET /health</button></section><section class="wide"><h2>Response</h2><pre id="out">Ready.</pre></section></main><script>async function health(){const r=await fetch('/health');out.textContent=JSON.stringify(await r.json(),null,2)}</script></body></html>
